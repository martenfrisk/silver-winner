<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" media="(prefers-color-scheme: light)" content="#fbfaf4" />
		<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0e1f1d" />
		<link rel="manifest" href="/manifest.webmanifest" />
		<link rel="apple-touch-icon" href="/icons/icon-192.png" />
		<script>
			// Apply a forced theme before first paint to avoid a flash of the wrong
			// theme. 'system' (or unset) leaves the attribute off so the
			// prefers-color-scheme media queries in app.css decide.
			try {
				var theme = JSON.parse(localStorage.getItem('myanlingo-progress-v1') || '{}').theme;
				if (theme === 'light' || theme === 'dark') {
					document.documentElement.setAttribute('data-theme', theme);
				}
			} catch (e) {
				/* corrupt storage — fall back to system */
			}
		</script>
		<title>Shwe — Learn Burmese</title>
		<meta
			name="description"
			content="Learn Burmese and its script through short, playful lessons — with pronunciation audio, spaced repetition and Shwe the golden cat. Free, offline-capable, no account needed."
		/>
		<meta property="og:type" content="website" />
		<meta property="og:title" content="Shwe — Learn Burmese" />
		<meta
			property="og:description"
			content="Short, playful Burmese lessons with real pronunciation audio and a script studio. Free, works offline, no account needed."
		/>
		<meta property="og:image" content="/icons/icon-512.png" />
		<meta name="twitter:card" content="summary" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
